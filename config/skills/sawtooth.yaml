id: "sawtooth"
version: "1.3.0"
name: "Sawtooth BidAsk"
description: "适用于波动偏大、短线有回撤风险的池子，采用 BidAsk 分布增强防守。"
status: "canary"
canaryPercent: 25
params:
  direction: "below"
  distributionType: "BidAsk"
  binCount: 138
  binStepPreference: [80, 100]
  feeRatePreference: [0.03, 0.05]
  entryConditions:
    - description: "Lincoln Score 至少 2.0，覆盖更高波动下的调仓与 gas 成本。"
      key: "lincolnScore"
      operator: "gte"
      value: 2.0
    - description: "Safety Score 至少 60。"
      key: "safetyScore"
      operator: "gte"
      value: 60
  exitConditions:
    - description: "出现开发者抛售信号时立刻退出。"
      key: "hasDevSell"
      operator: "eq"
      value: true
  rebalanceRules:
    - description: "价格反向穿越中枢 bin 过快时，通过 rebalance 收窄风险。"
      trigger: "rapid_reversion"
      action: "rebalance"
      threshold: 2
riskLimits:
  maxPositionSizePercent: 1.5
  maxTotalExposurePercent: 8
  maxConcurrentPositions: 8
  stopLossPercent: 18
  maxAliveHours: 48
  maxDailyRebalances: 8
applicability:
  minLincolnScore: 2.0
  minSafetyScore: 60
  minMcap: 800000
  maxMcap: 30000000
  lifecycleStages: ["hype", "plateau", "decline"]
changelog: "根据本地 dry-run 表现将 Sawtooth 调整为 25% 灰度，避免持续抢占默认主策略。"
previousVersion: "1.2.0"
createdAt: "2026-03-28T00:00:00.000Z"
updatedAt: "2026-03-28T00:00:00.000Z"
